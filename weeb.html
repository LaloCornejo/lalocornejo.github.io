<!DOCTYPE html>
<html lang="en">
    <head>
        <title> - Weeb -</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="css/style.css">
        <link rel="icon favicon" href="img/favicon-32x32.png">
    </head>
    <body>
        <header>
            <div class="Header">
                <a class="link" href="index.html"><img class="logo-white" src="img/Logo3.gif" alt="Logo"></a>
            </div>
            <div class="DarkMode">
                <button id="theme-toggle" aria-label="Switch to dark theme">
                    <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 100 100">
                        <g class="toggle-sun">
                            <circle class="cls-1" cx="50" cy="50" r="30" />
                            <circle class="cls-1" cx="100"></circle>
                        </g>    
                        <g class="toggle-circle">
                          <circle class="cls-1" cx="99" cy="-3" r="22" />
                        </g>
                      </svg>    
                </button>
            </div>    
        </header>
        <script src="js/theme-toggle.js"></script>
    </body>
</html>
